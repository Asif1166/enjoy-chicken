{% extends "base.html" %}
{% load static %}

{% block body %}
<div class="payment-area rts-section-gap">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <h2 class="text-center mb-4">Payment Details</h2>

                <!-- Payment Method Options -->
                <div class="payment-options">
                    <h4>Select a payment method:</h4>
                    <form action="{% url 'payment_confirmation' %}" method="post">
                        {% csrf_token %}

                        <!-- Cash on Delivery -->
                        <div class="form-group">
                            <input type="radio" id="payment-method-cod" name="payment_method" value="cash_on_delivery" required>
                            <label for="payment-method-cod">Paiement sur place</label>
                        </div>

                        <!-- Stripe -->
                        <div class="form-group">
                            <input type="radio" id="payment-method-stripe" name="payment_method" value="stripe" required>
                            <label for="payment-method-stripe">Stripe</label>
                        </div>

                        <!-- Stripe Payment Details (shown only when Stripe is selected) -->
                        <div id="stripe-details" class="payment-details" style="display: none;">
                            <h4>Stripe Payment:</h4>
                            <!-- Stripe Elements will be inserted here -->
                            <div id="card-element" class="form-control">
                                <!-- Stripe's Card Element will be inserted here -->
                            </div>
                            <div id="card-errors" role="alert" style="color:red;"></div>
                        </div>

                        <button type="submit" class="rts-btn btn-primary">Confirm Payment</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Show/Hide Stripe payment details based on selected method
        const stripeDetails = document.getElementById('stripe-details');
        const stripeRadio = document.getElementById('payment-method-stripe');
        const codRadio = document.getElementById('payment-method-cod');

        stripeRadio.addEventListener('change', function () {
            stripeDetails.style.display = 'block';
        });

        codRadio.addEventListener('change', function () {
            stripeDetails.style.display = 'none';
        });

        // Stripe Initialization
        const stripe = Stripe('your-publishable-key-here');
        const elements = stripe.elements();
        const card = elements.create('card');
        card.mount('#card-element');

        // Handle form submission and Stripe token generation
        const form = document.querySelector('form');
        form.addEventListener('submit', function (event) {
            if (stripeRadio.checked) {
                event.preventDefault();
                stripe.createToken(card).then(function (result) {
                    if (result.error) {
                        const errorElement = document.getElementById('card-errors');
                        errorElement.textContent = result.error.message;
                    } else {
                        // Append the Stripe token to the form and submit
                        const hiddenInput = document.createElement('input');
                        hiddenInput.setAttribute('type', 'hidden');
                        hiddenInput.setAttribute('name', 'stripeToken');
                        hiddenInput.setAttribute('value', result.token.id);
                        form.appendChild(hiddenInput);
                        form.submit();
                    }
                });
            }
        });
    });
</script>
{% endblock body %}
