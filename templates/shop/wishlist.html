<!-- cart.html -->
{% extends "base.html" %}
{% load static %}
{% block body %}

<div class="section-seperator bg_light-1">
    <div class="container">
        <hr class="section-seperator">
    </div>
</div>  



<!-- rts cart area start -->
<div class="rts-cart-area rts-section-gap bg_light-1">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-12">
                <div class="rts-cart-list-area wishlist">
                    <div class="single-cart-area-list head">
                        <div class="product-main">
                            <P>Products</P>
                        </div>
                   
                        <div class="quantity">
                           <p>Quantity</p>
                        </div>
                        <div class="quantity">
                           <p>Unit Price</p>
                        </div>
              
                        <div class="button-area">
                            <p>Add Item</p>
                        </div>
                    </div>

                    {% for product in products %}
    <div class="single-cart-area-list main item-parent single-shopping-card-one">
        <div class="product-main-cart">
            <div class="close section-activation delete-product-wishlist" data-product="{{ product.id }}">
                <i class="fa-regular fa-x"></i>
            </div>
            <div class="thumbnail">
                <img src="{{ product.image.url }}" alt="{{ product.title }}">
            </div>
            <div class="information">
                <a href="{% url 'product_details' product.pid %}"><h6 class="title">{{ product.title }}</h6></a>
                
            </div>
        </div>
       
        <div class="quantity">
            
            <div class="quantity-edit">
                <input type="text" class="input product-quantity-{{product.id}}" value="1" id="product-quantity">
                <div class="button-wrapper-action">
                    <button class="button"><i class="fa-regular fa-chevron-down"></i></button>
                    <button class="button plus">+<i class="fa-regular fa-chevron-up"></i></button>
                </div>
            </div>
        </div>
       
        <div class="subtotal">
            <p><span class="currrent-product-price-{{product.id}}">{{ product.price }}</span> €</p>
        </div>
        <div class="button-area">
            <a style="cursor: pointer;" class="rts-btn btn-primary radious-sm with-icon">
                <input type="hidden" class="product-quantity-{{product.id}}" value="1" id="product-quantity">
                <input type="hidden" class="product-pid-{{product.id}}" value="{{product.pid}}">
                <input type="hidden" class="product-image-{{product.id}}" value="{{product.image.url}}">
                <input type="hidden" class="product-id-{{product.id}}" value="{{product.id}}">
                <input type="hidden" class="product-title-{{product.id}}" value="{{product.title}}">
                
                {% if product.quantity > 0 %}
                <div class="btn-text add add-to-cart-btn" data-index="{{product.id}}" id="add-to-cart-btn">
                    Add To Cart
                </div>

                <div class="arrow-icon">
                    <i class="fa-regular fa-cart-shopping"></i>
                </div>
                {% else %}
                <div class="btn-text">
                    Out Of Stock
                </div>
                {% endif %}
            </a>
        </div>
    </div>
{% endfor %}

                </div>
            </div>
        </div>
    </div>
</div>
<!-- rts cart area end -->
  

{% endblock body %}
