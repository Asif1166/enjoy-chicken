<!DOCTYPE html>
{% load static%}
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <meta name="description" content="POS - Bootstrap Admin Template">
    <meta name="keywords"
        content="admin, estimates, bootstrap, business, corporate, creative, invoice, html5, responsive, Projects">
    <meta name="author" content="Dreamguys - Bootstrap Admin Template">
    <meta name="robots" content="noindex, nofollow">
    <title>Login - Pos admin template</title>

    <link rel="shortcut icon" type="image/x-icon" href="/static/custom_admin_css/assets/img/favicon2.png">

    <link rel="stylesheet" href="{% static 'custom_admin_css/assets/css/bootstrap.min.css' %}">

    <link rel="stylesheet" href="{% static 'custom_admin_css/assets/plugins/fontawesome/css/fontawesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'custom_admin_css/assets/plugins/fontawesome/css/all.min.css' %}">

    <link rel="stylesheet" href="{% static 'custom_admin_css/assets/css/style.css' %}">
</head>

<body class="account-page" style="background-color: #002654;">
    <!-- <div id="global-loader">
        <div class="whirly-loader"> </div>
    </div> -->

    <div class="main-wrapper">
        <div class="account-content">
            <div class="login-wrapper login-new">
                <div class="container">
                    <div class="login-content user-login">
                        <div class="login-logo">
                            <img src="{{site_info.logo.url}}" alt="img">
                            <a href="" class="login-logo logo-white">
                                <img src="{{site_info.logo.url}}" alt="">
                            </a>
                        </div>


                        <form method="POST" action="{% url 'admin_login' %}">
                            {% csrf_token %}
                            <div class="login-userset">
                                <div class="login-userheading">
                                    <h3>Sign In</h3>
                                    <h4>Access the admin panel using your email and passcode.</h4>
                                </div>
                                <div class="form-login">
                                    <label class="form-label">Email Address</label>
                                    <div class="form-addons">
                                        <input type="email" name="email" class="form-control" required>
                                        <img src="/static/custom_admin_css/assets/img/icons/mail.svg" alt="img">
                                    </div>
                                </div>
                                <div class="form-login">
                                    <label>Password</label>
                                    <div class="pass-group">
                                        <input type="password" name="password" class="pass-input" required>
                                        <span class="fas toggle-password fa-eye-slash"></span>
                                    </div>
                                </div>
                                <!-- <div class="form-login authentication-check">
                                    <div class="row">
                                        <div class="col-6">
                                            <div class="custom-control custom-checkbox">
                                                <label class="checkboxs ps-4 mb-0 pb-0 line-height-1">
                                                    <input type="checkbox" name="remember_me">
                                                    <span class="checkmarks"></span>Remember me
                                                </label>
                                            </div>
                                        </div>
                                        <div class="col-6 text-end">
                                            <a class="forgot-link" href="forgot-password-3.html">Forgot Password?</a>
                                        </div>
                                    </div>
                                </div> -->
                                <div class="form-login">
                                    <button class="btn btn-login" type="submit">Sign In</button>
                                </div>
                            </div>
                        </form>
                        


                    </div>
                    <div class="my-4 d-flex justify-content-center align-items-center copyright-text">
                        <p>Copyright &copy; 2024 Vaisushi. All rights reserved. Develop by <a href="">RozSoft.tech</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="customizer-links" id="setdata">
        <ul class="sticky-sidebar">
            <li class="sidebar-icons">
                <a href="#" class="navigation-add" data-bs-toggle="tooltip" data-bs-placement="left"
                    data-bs-original-title="Theme">
                    <i data-feather="settings" class="feather-five"></i>
                </a>
            </li>
        </ul>
    </div>

    <script src="{% static 'custom_admin_css/assets/js/jquery-3.7.1.min.js' %}" type="a8e4d673d8af98034973e9bb-text/javascript"></script>

    <script src="{% static 'custom_admin_css/assets/js/feather.min.js' %}" type="a8e4d673d8af98034973e9bb-text/javascript"></script>

    <script src="{% static 'custom_admin_css/assets/js/bootstrap.bundle.min.js' %}" type="a8e4d673d8af98034973e9bb-text/javascript"></script>
    <script src="{% static 'custom_admin_css/assets/js/theme-script.js' %}" type="a8e4d673d8af98034973e9bb-text/javascript"></script>
    <script src="{% static 'custom_admin_css/assets/js/script.js' %}" type="a8e4d673d8af98034973e9bb-text/javascript"></script>
    <script src="../../static/custom_admin_css/cdn-cgi/scripts/7d0fa10a/cloudflare-static/rocket-loader.min.js"
        data-cf-settings="a8e4d673d8af98034973e9bb-|49" defer=""></script>
</body>

</html>
