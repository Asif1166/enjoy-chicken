<audio id="notificationSound" src="{% static 'custom_admin_css/not.mp3' %}" preload="auto"></audio>


<script>
  $(document).ready(function() {
    let soundTimer;
    let lastOrderCount = 0; // Track the last known number of orders

    function fetchOrders() {
        $.ajax({
            url: '{% url "fetch_orders_data" %}',
            method: 'GET',
            success: function(data) {
                const newOrderCount = data.orders.length;

                // Check if new orders are available
                if (newOrderCount > lastOrderCount) {
                    playSoundForOneMinute();
                }

                // Update the order count and the table
                lastOrderCount = newOrderCount;
                updateOrdersTable(data.orders);
            },
            error: function(xhr, status, error) {
                console.error("Error fetching orders:", error);
            }
        });
    }

    function updateOrdersTable(orders) {
        const ordersTableBody = $('#orders-table-body');
        ordersTableBody.empty();

        orders.forEach(function(order) {
            const orderRow = `
                <tr class="fetched-row">
                    
                    <td># 00${order.id}</td>
                    <td>${order.customer_name}<br>${order.customer_email}<br>${order.customer_phone}</td>
                    <td>${order.customer_street_address}<br>${order.customer_zip_code}<br>${order.customer_city}</td>
                    <td class="payment-info">
                        ${order.payment_method === 'Stripe' 
                            ? `<img src="${order.payment_icon}" alt="Pay">`
                            : '<strong>N/A</strong>'}
                    </td>
                    <td>${order.payment_method === 'Stripe' 
                            ? `${order.stripe_payment_intent_id}`
                            : '<strong>N/A</strong>'}</td>
                    <td>${order.shipping_cost}</td>
                    <td>${order.price} €</td>
                    <td>${order.order_type}</td>
                    <td>
                        <div class="dropdown">
                            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                ${order.product_status}
                            </button>
                           
                        </div>
                    </td>
                </tr>
            `;
            ordersTableBody.append(orderRow);
        });

        feather.replace();
    }

    function playSoundForOneMinute() {
        clearTimeout(soundTimer);
        const audioElement = document.getElementById('notificationSound');
        if (audioElement) {
            audioElement.play().catch((error) => {
                console.error("Error playing sound:", error);
            });
        }

        soundTimer = setTimeout(() => {
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
            }
        }, 60000);
    }

    fetchOrders();
    setInterval(fetchOrders, 10000);
});

</script>


        








<script>
    $(document).ready(function() {
        // Function to fetch orders
        function fetchOrders() {
            $.ajax({
                url: '{% url "fetch_orders_data" %}',
                method: 'GET',
                success: function(data) {
                    updateOrdersTable(data.orders);
                },
                error: function(xhr, status, error) {
                    console.error("Error fetching orders:", error);
                }
            });
        }

        // Function to update the orders table
        function updateOrdersTable(orders) {
            const ordersTableBody = $('#orders-table-body');
            ordersTableBody.empty(); // Clear previous rows

            orders.forEach(function(order) {
                const orderRow = `
                    <tr class="fetched-row">
                        
                        <td># 00${order.id}</td>
                      
                        <td>${order.customer_name}<br>${order.customer_email}<br>${order.customer_phone}</td>
                        <td>
                             ${order.customer_street_address}<br>${order.customer_zip_code}<br>${order.customer_city}
                        </td>
                        <td class="payment-info">
                            ${order.payment_method === 'Stripe' 
                                ? `<img src="${order.payment_icon}" alt="Pay">`
                                : '<strong>N/A</strong>'}
                        </td>
                         <td>
                            ${order.payment_method === 'Stripe' 
                                ? `${order.stripe_payment_intent_id}`
                                : '<strong>N/A</strong>'}
                        </td>

                        <td>€ ${order.shipping_cost}</td>
                        <td>€ ${order.price} </td>
                        <td>${order.order_type}</td>
                        <td>
                            <!-- Status Display and Dropdown -->
                            <div class="dropdown">
                                <button class="btn btn-secondary dropdown-toggle" type="button" id="statusDropdown-${order.id}" data-bs-toggle="dropdown" aria-expanded="false">
                                    ${order.product_status}
                                </button>
                               
                            </div>
                        </td>
                       
                        <td class="text-center">
                            <a class="action-set" href="javascript:void(0);" data-bs-toggle="dropdown" aria-expanded="true">
                                <i class="fa fa-ellipsis-v" aria-hidden="true"></i>
                            </a>
                            <ul class="dropdown-menu">
                                <li>
                                    <a href="" class="dropdown-item">
                                        <i data-feather="download" class="info-img"></i>Download PDF
                                    </a>
                                </li>
                                <li>
                                    <a href="" class="dropdown-item mb-0">
                                        <i data-feather="trash-2" class="info-img"></i>Delete Sale
                                    </a>
                                </li>
                            </ul>
                        </td>
                    </tr>
                `;
                ordersTableBody.append(orderRow);
            });

            // Refresh icons (if using Feather icons)
            feather.replace();
        }

        // Initial fetch and set interval to refresh every 10 seconds
        fetchOrders();
        setInterval(fetchOrders, 10000);
    });
</script>
