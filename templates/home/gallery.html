    <!-- Start Gallery 
    ============================================= -->
    <div class="gallery-style-one-area overflow-hidden default-padding">

        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                <div class="site-heading text-center">
                    <h4 class="sub-title">Produit alimentaire</h4>
                    <h2 class="title">Notre galerie alimentaire</h2>
                </div>
            </div>
        </div>

        <div class="container-full">
            <div class="row">
                <div class="col-lg-12">
                    <div class="gallery-style-one-carousel swiper">
                        <!-- Additional required wrapper -->
                        <div class="swiper-wrapper">
    
                            <!-- Single Item -->
                            {% for item in photo_gallery %}
                            <div class="swiper-slide">
                                <div class="gallery-style-one">
                                    <div class="item">
                                        <img src="{{ item.image.url }}" alt="{{ item.title }}">
                                        {% if item.subtitle %}
                                        <div class="overlay">
                                            <span>{{ item.subtitle }}</span>
                                            <h4><a >{{ item.title }}</a></h4>
                                        </div>
                                        {% endif %}
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                            <!-- End Single Item -->
    
                         
    
                        </div>
    
                        <!-- Pagination -->
                        <div class="swiper-pagination"></div>
    
                    </div>
                </div>
            </div>
        </div>

    </div>
    <!-- End Gallery -->
