







<!-- rts grocery feature area start -->
<div class="rts-grocery-feature-area rts-section-gapBottom only-pc">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="title-area-between">
                    <h2 class="title-left">
                        Featured Grocery
                    </h2>
                    <div class="next-prev-swiper-wrapper">
                        <div class="swiper-button-prev"><i class="fa-regular fa-chevron-left"></i></div>
                        <div class="swiper-button-next"><i class="fa-regular fa-chevron-right"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="category-area-main-wrapper-one">
                    <div class="swiper mySwiper-category-1 swiper-data " data-swiper='{
                        "spaceBetween":16,
                        "slidesPerView":6,
                        "loop": true,
                        "speed": 700,
                        "navigation":{
                            "nextEl":".swiper-button-next",
                            "prevEl":".swiper-button-prev"
                          },
                        "breakpoints":{
                        "0":{
                            "slidesPerView":1,
                            "spaceBetween": 12},
                        "320":{
                            "slidesPerView":1,
                            "spaceBetween":12},
                        "480":{
                            "slidesPerView":2,
                            "spaceBetween":12},
                        "640":{
                            "slidesPerView":2,
                            "spaceBetween":16},
                        "840":{
                            "slidesPerView":3,
                            "spaceBetween":16},
                        "1140":{
                            "slidesPerView":5,
                            "spaceBetween":16},
                        "1540":{
                            "slidesPerView":5,
                            "spaceBetween":16},
                        "1840":{
                            "slidesPerView":6,
                            "spaceBetween":16}
                        }
                    }'>
                        <!-- Swiper Initialization -->
                        <div class="swiper-wrapper">
                            <!-- single swiper start -->
                            {% for product in grocery_products %}
                            <div class="swiper-slide">
                                <div class="single-shopping-card-one">
                                    <!-- Image and action area start -->
                                    <div class="image-and-action-area-wrapper">
                                        <a href="{% url 'product_details' product.pid  %}" class="thumbnail-preview">
                                            <div class="badge">
                                                <span>{{ product.percentage }}% <br> 
                                                    Off
                                                </span>
                                                <i class="fa-solid fa-bookmark"></i>
                                            </div>
                                            <img src="{{ product.image.url }}" alt="{{ product.title }}">
                                        </a>
                                        <div class="action-share-option">
                                            <div class="single-action openuptip message-show-action" data-flow="up" title="Add To Wishlist">
                                                <i class="fa-light fa-heart"></i>
                                            </div>
                                            <div class="single-action openuptip" data-flow="up" title="Compare" data-bs-toggle="modal" data-bs-target="#exampleModal">
                                                <i class="fa-solid fa-arrows-retweet"></i>
                                            </div>
                                            <div class="single-action openuptip cta-quickview product-details-popup-btn" data-flow="up" title="Quick View">
                                                <i class="fa-regular fa-eye"></i>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Image and action area end -->

                                    <div class="body-content">
                                        <a href="{% url 'product_details' product.pid  %}">
                                            <h4 data-title-fr="{{ product.title }}"
                                            data-title-en="{{ product.eng_title }}"
                                            class="title">{{ product.title }}</h4>
                                        </a>
                                        <span class="availability">{{ product.specifications }}</span>
                                        <div class="price-area">
                                            <span class="current"> <span class="currrent-product-price-{{product.id}}">{{ product.price }}</span> €</span>
                                            <div class="previous">{{ product.old_price }} €</div>
                                        </div>
                                        <div class="cart-counter-action">
                                            {% if product.quantity > 0 %}
                                            <div class="quantity-edit">
                                                <input type="text" class="product-quantity-{{product.id}} input" value="1" id="product-quantity">
                                                <div class="button-wrapper-action">
                                                    <button class="button"><i class="fa-regular fa-chevron-down"></i></button>
                                                    <button class="button plus">+<i class="fa-regular fa-chevron-up"></i></button>
                                                </div>
                                            </div>
                                            {% endif %}
                                            <a class="rts-btn btn-primary radious-sm with-icon">
                                                <input type="hidden" class="product-quantity-{{product.id}}" value="1" id="product-quantity">
                                                <input type="hidden" class="product-pid-{{product.id}}" value="{{product.pid}}">
                                                <input type="hidden" class="product-image-{{product.id}}" value="{{product.image.url}}">
                                                <input type="hidden" class="product-id-{{product.id}}" value="{{product.id}}">
                                                <input type="hidden" class="product-title-{{product.id}}" value="{{product.title}}">
                                                 
                                                {% if product.quantity > 0 %}
                                                <button class="btn-text add add-to-cart-btn" data-index="{{product.id}}" id="add-to-cart-btn">Add</button>
                                                <div class="arrow-icon"><i class="fa-regular fa-cart-shopping"></i></div>
                                               
                                                {% else %}
                                                 <button class="btn-text-out-of-stock add" disabled>Out Of Stock</button>

                                                {% endif %}
                                                
                                             </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                                  
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- rts grocery feature area end -->
