    <!-- Start Brand 
    ============================================= -->
    <div class="brand-area overflow-hidden default-padding bg-cover text-center bg-blue" style="background-image: url(assets/img/shape/1.png);">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <h4 class="sub-title" id="JapaneseSushiText">Articles de Sushi Japonais</h4>
                    <div class="brand-style-one-carousel swiper mt-40">
                        <!-- Additional required wrapper -->
                        <div class="swiper-wrapper">
                            {% for brand in brands %}
                                <!-- Single Item -->
                                <div class="swiper-slide">
                                    {% if brand.link %}
                                        <a href="{{ brand.link }}" target="_blank">
                                            <img src="{{ brand.logo.url }}" alt="{{ brand.name }}">
                                        </a>
                                    {% else %}
                                        <img src="{{ brand.logo.url }}" alt="{{ brand.name }}">
                                    {% endif %}
                                </div>
                                <!-- End Single Item -->
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- End Brand -->
