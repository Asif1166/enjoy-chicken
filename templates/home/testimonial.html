    <!-- Start Testimonial 
    ============================================= -->
    <div class="testimonial-area bg-gray default-padding">

        <div class="testimonial-shape">
            <img src="/static/assets/img/shape/5.png" alt="Image Not Found">
            <img src="/static/assets/img/shape/7.png" alt="Image Not Found">
        </div>

        <div class="container">

            <div class="row">
                <div class="col-lg-8 offset-lg-2">
                    <div class="site-heading text-center">
                        <h4 class="sub-title">Des clients satisfaits</h4>
                        <h2 class="title">Commentaires de nos clients</h2>
                    </div>
                </div>
            </div>

            <div class="row align-center ">
                <div class="col-lg-5">
                    <div class="testimonial-thumb">
                        <img src="/static/assets/img/800x800.png" alt="Image Not Found">
                        <img src="/static/assets/img/800x800.png" alt="Image Not Found">
                        <img src="/static/assets/img/800x800.png" alt="Image Not Found">
                        <img src="/static/assets/img/800x800.png" alt="Image Not Found">
                    </div>
                </div>
                <div class="col-lg-6 offset-lg-1">
                    <div class="testimonial-carousel swiper">
                        <!-- Additional required wrapper -->
                        <div class="swiper-wrapper">
                            <!-- Single item -->
                             {% for testimonial in testimonials %}
                            <div class="swiper-slide">
                                <div class="testimonial-style-one">
                                    
                                    <div class="item">
                                        <div class="content">
                                            <div class="rating">
                                                <div class="icon">
                                                    {% for i in "5" %}
                                                <i class="fas fa-star"></i>
                                            {% endfor %}
                                                  
                                                </div>
                                                <span>({{ testimonial.rating }}/5)</span>
                                            </div>
                                            <h2>{{ testimonial.title }}</h2>
                                            <p>
                                                {{ testimonial.description }}
                                            </p>
                                        </div>
                                        <div class="provider">
                                            <i class="flaticon-quote"></i>
                                            <div class="info">
                                                <h4>{{ testimonial.provider_name }}</h4>
                                                <span>{{ testimonial.provider_position }}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                            <!-- End Single item -->
                         
                        </div>

                        <!-- Pagination -->
                        <div class="swiper-pagination"></div>

                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- End Testimonial -->
